# JP Patches lending relay — Cloudflare Worker config.
# Deploy steps in relay/README.md.
name = "jp-patches-lend"
main = "worker.js"
compatibility_date = "2026-06-01"

# Served at lend.jx-3p.com (jx-3p.com's zone lives on this Cloudflare
# account). This custom-domain route doubles as the Worker's only
# address — workers.dev subdomain deliberately not registered.
routes = [
  { pattern = "lend.jx-3p.com", custom_domain = true }
]
