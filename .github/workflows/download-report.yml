name: Download report

# Daily check for NEW downloads, emailed only when there's something to say.
# GitHub exposes only a cumulative per-asset counter, so this job stores the
# last reported totals in .github/download-stats.json and reports the delta.
#
# Behaviour:
#   - runs daily; if nothing new since the last report, it exits silently
#     (no email, no commit)
#   - when there ARE new downloads, it emails the delta, then commits the new
#     snapshot — so the delta always means "since your last report"
#   - the email is sent BEFORE the snapshot is committed, so a failed send
#     leaves the snapshot untouched and tomorrow's run retries it
#
# One-time setup (already done): repo secrets MAIL_USERNAME / MAIL_PASSWORD
# (a Gmail App Password) under Settings → Secrets and variables → Actions.

on:
  schedule:
    - cron: '0 14 * * *'      # every day, 14:00 UTC
  workflow_dispatch: {}         # allow manual runs (Actions tab → Run workflow)

permissions:
  contents: write              # to commit the snapshot

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute download deltas
        id: calc
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Current cumulative totals across ALL releases.
          gh api --paginate "repos/${{ github.repository }}/releases" \
            -q '.[] | .assets[] | "\(.name)\t\(.download_count)"' > /tmp/assets.tsv
          mac_new=$(awk -F'\t' 'tolower($1) ~ /\.dmg$/      {s+=$2} END{print s+0}' /tmp/assets.tsv)
          mac_upd=$(awk -F'\t' 'tolower($1) ~ /mac.*\.zip$/ {s+=$2} END{print s+0}' /tmp/assets.tsv)
          pc_new=$( awk -F'\t' 'tolower($1) ~ /\.exe$/      {s+=$2} END{print s+0}' /tmp/assets.tsv)

          # Totals as of the last REPORT (not the last run).
          snap=.github/download-stats.json
          if [ -f "$snap" ]; then
            first=false
            p_mac_new=$(jq -r '.mac_new // 0' "$snap")
            p_mac_upd=$(jq -r '.mac_upd // 0' "$snap")
            p_pc_new=$( jq -r '.pc_new  // 0' "$snap")
            p_updated=$(jq -r '.updated // ""' "$snap")
          else
            first=true
            p_mac_new=$mac_new; p_mac_upd=$mac_upd; p_pc_new=$pc_new; p_updated=""
          fi
          d_mac_new=$(( mac_new - p_mac_new ))
          d_mac_upd=$(( mac_upd - p_mac_upd ))
          d_pc_new=$((  pc_new  - p_pc_new  ))
          total_new=$(( d_mac_new + d_mac_upd + d_pc_new ))

          # Decide what happens: email only if there's something new;
          # commit only when we report (or to seed the very first baseline).
          send=false; commit=false
          if [ "$first" = true ]; then
            commit=true
          elif [ "$total_new" -gt 0 ]; then
            send=true; commit=true
          fi
          echo "send=$send"     >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "Deltas — mac_new:$d_mac_new mac_upd:$d_mac_upd pc:$d_pc_new (send=$send)"

          # Stage the new snapshot (committed later, only if we reported).
          mkdir -p .github
          printf '{"mac_new":%d,"mac_upd":%d,"pc_new":%d,"updated":"%s"}\n' \
            "$mac_new" "$mac_upd" "$pc_new" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$snap"

          # Geography (best-effort). The Cloudflare Worker counts download-button
          # clicks by country — GitHub's counter has no geo at all. Fails soft:
          # if the Worker is unreachable or has nothing yet, the email simply
          # omits this section. NOTE these are button clicks (new installs via
          # the site), so they won't match the GitHub totals above — those stay
          # the source of truth for real download counts.
          names='{"US":"United States","GB":"United Kingdom","DE":"Germany","JP":"Japan","CA":"Canada","AU":"Australia","FR":"France","NL":"Netherlands","SE":"Sweden","IT":"Italy","ES":"Spain","BR":"Brazil","MX":"Mexico","PL":"Poland","NO":"Norway","DK":"Denmark","FI":"Finland","BE":"Belgium","CH":"Switzerland","AT":"Austria","IE":"Ireland","NZ":"New Zealand","RU":"Russia","UA":"Ukraine","CZ":"Czechia","PT":"Portugal","GR":"Greece","TR":"Turkey","IN":"India","CN":"China","KR":"South Korea","TW":"Taiwan","AR":"Argentina","CL":"Chile","CO":"Colombia","ZA":"South Africa","IL":"Israel","IR":"Iran","SG":"Singapore","HK":"Hong Kong","HU":"Hungary","RO":"Romania","TH":"Thailand","ID":"Indonesia","PH":"Philippines","VN":"Vietnam","MY":"Malaysia","EE":"Estonia","LT":"Lithuania","LV":"Latvia","SK":"Slovakia","SI":"Slovenia","HR":"Croatia","RS":"Serbia","BG":"Bulgaria","IS":"Iceland","LU":"Luxembourg","XX":"Unknown"}'
          geo=""
          since_day=$(printf '%s' "${p_updated}" | tr -d '-' | cut -c1-8)
          if stats=$(curl -fsS --max-time 10 "https://lend.jx-3p.com/download/stats?since=${since_day}" 2>/dev/null); then
            geo=$(printf '%s' "$stats" | jq -r --argjson n "$names" '
              (.byCountry // {}) | to_entries
              | map(select((((.value.mac // 0) + (.value.pc // 0)) > 0)))
              | sort_by(-((.value.mac // 0) + (.value.pc // 0)))
              | .[]
              | "  \($n[.key] // .key): \((.value.mac // 0) + (.value.pc // 0))  (Mac \(.value.mac // 0), PC \(.value.pc // 0))"
            ' 2>/dev/null || printf '')
          fi

          # Email body.
          {
            echo "JP Patches — new downloads"
            echo "($(date -u '+%b %-d, %Y'))"
            echo ""
            echo "Since your last report:"
            echo "  Mac — new installs (.dmg):  +${d_mac_new}"
            echo "  Mac — auto-updates (.zip):  +${d_mac_upd}"
            echo "  PC  — downloads (.exe):     +${d_pc_new}   (all fresh — no Windows updater yet)"
            if [ -n "$geo" ]; then
              echo ""
              echo "Where from (site button clicks — new installs only):"
              printf '%s\n' "$geo"
            fi
            echo ""
            echo "All-time totals:"
            echo "  Mac new: ${mac_new}   Mac updates: ${mac_upd}   PC: ${pc_new}"
          } > /tmp/body.txt

          {
            echo 'body<<BODY_EOF'
            cat /tmp/body.txt
            echo 'BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Email the report
        if: steps.calc.outputs.send == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: JP Patches <${{ secrets.MAIL_USERNAME }}>
          to: danielspils@gmail.com
          subject: "JP Patches — new downloads"
          body: ${{ steps.calc.outputs.body }}

      # Committed only after a successful send (or to seed the first baseline),
      # so a failed email doesn't burn the delta.
      - name: Commit snapshot
        if: steps.calc.outputs.commit == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/download-stats.json
          # [skip ci] so the snapshot commit doesn't trigger the Windows / Pages builds.
          git commit -m "chore: download snapshot [skip ci]" || { echo "no change"; exit 0; }
          git push
