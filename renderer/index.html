<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>JP Patches</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- LEFT COLUMN: panel + hardware buttons below it -->
  <div id="left-column">
    <aside id="left-panel">
      <div id="tabs">
        <button class="tab active" data-bank="C">Bank C</button>
        <button class="tab"        data-bank="D">Bank D</button>
        <button class="tab"        data-bank="L">Library</button>
      </div>
      <div id="patch-list"></div>
      <div id="bottom-actions"></div>
    </aside>
    <div id="hw-tape">
      <div id="hw-tape-row">
        <div id="hw-tape-left">
          <div id="hw-tape-header">Tape Memory</div>
          <div id="hw-buttons">
            <div class="hw-button-wrap">
              <div class="hw-label">Save</div>
              <button class="hw-btn save" id="hw-save"></button>
              <div class="hw-sublabel">from JX-3P</div>
            </div>
            <div class="hw-button-wrap">
              <div class="hw-label">Load</div>
              <button class="hw-btn load" id="hw-load"></button>
              <div class="hw-sublabel">to JX-3P</div>
            </div>
          </div>
        </div>
        <div class="hw-mode-section">
          <button class="hw-switch" id="hw-mode" aria-label="Tape dump or MIDI mode">
            <span class="hw-switch-seg top"></span>
            <span class="hw-switch-seg mid"></span>
            <span class="hw-switch-seg bot"></span>
          </button>
          <div class="hw-mode-labels">
            <span>tape</span>
            <span>midi</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <main id="right-panel">
    <div id="drag-bar"></div>
    <div id="panel-host"></div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
