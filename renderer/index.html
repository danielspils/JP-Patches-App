<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>JP Patches</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- LEFT COLUMN: panel + hardware buttons below it -->
  <div id="left-column">
    <aside id="left-panel">
      <div id="tabs">
        <button class="tab active" data-bank="C">Bank C</button>
        <button class="tab"        data-bank="D">Bank D</button>
        <button class="tab"        data-bank="L">Library</button>
      </div>
      <div id="lib-sub-tabs" hidden>
        <button class="lib-sub-tab active" data-libtab="tones">Tones</button>
        <button class="lib-sub-tab"        data-libtab="sequences">Sequences</button>
      </div>
      <div id="patch-list"></div>
      <div id="bottom-actions"></div>
    </aside>
    <div id="hw-tape">
      <div class="hw-tape-header-wrap">
        <select id="hw-memory-mode" class="hw-tape-header">
          <option value="tape">Tape Memory</option>
          <option value="midi">MIDI Memory</option>
        </select>
      </div>
      <div id="hw-sections">
        <div class="hw-section">
          <div class="hw-section-header">Tone</div>
          <div class="hw-section-buttons">
            <div class="hw-button-wrap">
              <div class="hw-label">Save</div>
              <button class="hw-btn save" id="hw-tone-save"></button>
              <div class="hw-sublabel">from JX-3P</div>
            </div>
            <div class="hw-button-wrap">
              <div class="hw-label">Load</div>
              <button class="hw-btn load" id="hw-tone-load"></button>
              <div class="hw-sublabel">to JX-3P</div>
            </div>
          </div>
        </div>
        <div class="hw-section">
          <div class="hw-section-header">Sequencer</div>
          <div class="hw-section-buttons">
            <div class="hw-button-wrap">
              <div class="hw-label">Save</div>
              <button class="hw-btn save" id="hw-seq-save"></button>
              <div class="hw-sublabel">from JX-3P</div>
            </div>
            <div class="hw-button-wrap">
              <div class="hw-label">Load</div>
              <button class="hw-btn load" id="hw-seq-load"></button>
              <div class="hw-sublabel">to JX-3P</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <main id="right-panel">
    <div id="drag-bar"></div>
    <div id="panel-host"></div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
