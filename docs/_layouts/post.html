---
layout: default
---
<article class="note-post">
  <header class="note-post-head">
    <h1 class="note-post-title">{{ page.title }}</h1>
    <p class="note-post-date">{{ page.date | date: '%B %-d, %Y' }}</p>
  </header>

  {% if page.video %}{% include video-embed.html id=page.video title=page.title %}{% endif %}

  <div class="note-post-body">
    {{ content }}
  </div>

  <p class="note-post-back"><a href="{{ '/notes/' | relative_url }}">&larr; All disPATCHES</a></p>
</article>
