<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Open Graph / Twitter card — gives jx-3p.com a nice preview when
       shared in Slack, iMessage, Facebook, etc. Uses the hero screenshot. -->
  <meta property="og:title" content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:image" content="{{ '/screenshots/jx-hero.png' | absolute_url }}">
  <meta property="og:url" content="{{ site.url }}">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Favicon set, all generated from assets/img/jp-logo.png via sips
       center-crop (1026×1026 square) → 32 / 180 / 192. Total ~83KB
       across all three sizes (vs. the 800KB original being downloaded
       every browser tab). -->
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/img/favicon-32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ '/assets/img/favicon-192.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/apple-touch-icon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header" aria-label="Site header">
    <!-- JX-3P front-panel A/B/C/D bank-indicator motif structurally
         integrated into the header (Daniel-spec, May 28):
         - Dark band fills the full width as the canvas
         - Green/blue swoops sit ON TOP of the dark band's left side,
           their top edges form stripes (above the logo, within the
           dark band), their bodies extend down through the band, and
           their bottoms bleed BELOW the band into the body area
         - Red C/D parallelograms sit ENTIRELY BELOW the dark band in
           the bleed zone, aligned horizontally with the logo
         - Single red stripe from D's top-right extends to viewport edge -->

    <!-- 1. Dark band background, full width -->
    <div class="site-header-band" aria-hidden="true"></div>

    <!-- 2. Green (A) + Blue (B) swoops — absolute, on top of dark band,
            extending from y=15 (inside band, above logo) down to y=200
            (bottom of header, in bleed zone). Stripes are CSS-positioned
            so they can extend to the viewport's right edge. -->
    <svg class="ab-swoops" viewBox="0 0 250 185" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <polygon points="80,0   160,0   80,185   0,185"  fill="#1f6e5b"/>
      <polygon points="160,10 240,10 160,185 80,185"   fill="#2c5fb5"/>
    </svg>
    <span class="header-stripe stripe-a" aria-hidden="true"></span>
    <span class="header-stripe stripe-b" aria-hidden="true"></span>

    <!-- 3. Content row — sits on top of the dark band. padding-left
            clears the AB swoops so logo doesn't overlap them. -->
    <div class="site-header-inner">
      <a href="{{ '/' | relative_url }}" class="site-brand" aria-label="JP Patches home">
        <img src="{{ '/assets/img/jp-logo.png' | relative_url }}" alt="" class="site-logo">
        <span class="site-brand-text">
          <span class="site-title">JP Patches</span>
          <span class="site-subtitle">a companion app for the Roland JX-3P and PG-200</span>
        </span>
      </a>
      <a href="https://github.com/danielspils/JP-Patches-App/releases/latest"
         class="site-download"
         rel="noopener">
        JP Patches for macOS
      </a>
    </div>

    <!-- 4. Red C/D swoops — two matching parallelograms side-by-side,
            sitting in the bleed zone below the dark band. Horizontally
            anchored to start below the logo's left edge. -->
    <svg class="cd-swoops" viewBox="0 0 170 50" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <polygon points="20,0  80,0  60,50  0,50"  fill="#b94a2e"/>
      <polygon points="85,0 145,0 125,50 65,50"  fill="#b94a2e"/>
    </svg>
    <span class="header-stripe stripe-cd" aria-hidden="true"></span>
  </header>

  <main class="site-main">
    <article class="site-content">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="site-footer-strip" aria-hidden="true"></div>
    <div class="site-footer-inner">
      <span>JP Patches is free and open source · MIT licensed</span>
      <span class="site-footer-dot" aria-hidden="true">·</span>
      <a href="https://github.com/danielspils/JP-Patches-App" rel="noopener">GitHub</a>
      <span class="site-footer-dot" aria-hidden="true">·</span>
      <span>Made by <a href="https://spils.studio" rel="noopener">Daniel Spils</a></span>
    </div>
  </footer>

  <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
